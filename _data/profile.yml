# Research 섹션
# ============================================================

research_goal:
  title: "Research Interests"
  paragraphs:
    - 'I view generative models as mathematical tools for representing distributions, where the same mathematical properties shape both capability and safety. My work has spanned Flow Matching for multi-modal generation (Interspeech 2026), diffusion-based 3D synthesis, and out-of-distribution robustness. I am particularly interested in how generative priors and RL fine-tuning interact in decision-making agents, and how principled foundations can make these systems both more capable and safer.'

