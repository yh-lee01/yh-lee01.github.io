# Research 섹션
# ============================================================

research_goal:
  title: "Research Interests"
  paragraphs:
    - 'I am interested in the intersection of <strong>generative models</strong>, <strong>sequential decision-making</strong>, and <strong>AI safety</strong>. Specifically, I explore how expressive generative priors (e.g., Flow Matching, Diffusion) can represent complex behaviors for embodied agents, and how we can use reinforcement learning to fine-tune these generative policies safely.'
    - 'My previous work spans out-of-distribution robustness (ImageNet-ES), 3D synthesis (DDPM), and multi-modal generation (Flow Matching). Through these experiences, I have come to view the capability and safety of generative models as two sides of the same equation. As these models expand from generating content to taking actions in the physical world, my core objective is to ensure that powerful policy models remain safe and aligned.'

