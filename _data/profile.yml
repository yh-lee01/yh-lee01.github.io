research_goal:
  title: "Research Goal"
  paragraphs:
    - "My goal is to develop AI that works reliably in the real world. I believe this requires learning to model the world itself — and <strong>generative approaches</strong>, in my view, are the most promising path toward this."
    - "What drew me in was seeing generative models begin to solve problems in <strong>RL</strong> that had long resisted other approaches. My current focus is <strong>Flow Matching</strong> as a framework for structured action space learning in <strong>robot manipulation</strong>."
  references:
    - title: "Cao et al., Diffusion Models for Reinforcement Learning: A Survey (2023)"
      url: "https://arxiv.org/abs/2311.01223"

