# Research 섹션
# ============================================================

research_goal:
  title: "Research Interests"
  paragraphs:
    - 'I study the <strong>intersection of generative models and sequential decision-making</strong>, with a focus on <strong>safety</strong>. I view generative models as mathematical tools where capability and safety are shaped by the same underlying mathematics.'
    - 'My recent work spans multi-modal generation (Flow Matching), 3D synthesis (DDPM), and out-of-distribution robustness (ImageNet-ES). As generative models and RL algorithms expand from merely generating content to making sequential decisions in the physical world, <strong>safety must be a foundational consideration in every step</strong>.'
    - 'Ultimately, my research goal is to build capable AI systems that remain safe, robust, and aligned with human intentions.'

