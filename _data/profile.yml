bio:
  - 'I am a senior undergraduate at <a href="https://www.skku.edu">Sungkyunkwan University</a> (Computer Science and Engineering, expected Aug. 2027), interested in the intersection of generative models and sequential decision-making, with a focus on AI safety. I have research experience at <a href="https://sites.google.com/view/pixel-lab-ai/home">Pixel Lab</a> (Korea University), <a href="https://aiot.snu.ac.kr/home">AIoT Lab</a> (Seoul National University), and <a href="https://v-laboratory.github.io/#/">V-Lab</a> (Sungkyunkwan University). I am seeking graduate research opportunities for <strong>Fall 2027</strong>.'

