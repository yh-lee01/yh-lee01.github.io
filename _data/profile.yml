bio:
  - 'I am an undergraduate researcher at <a href="https://sites.google.com/view/pixel-lab-ai/home">Pixel Lab</a> (Korea University, advised by <a href="https://sites.google.com/view/sangmin-lee/home">Prof. Sangmin Lee</a>). I study the intersection of <strong>generative models</strong> and <strong>sequential decision-making</strong> — how to represent complex action distributions with expressive generative priors and how to optimize them through reinforcement learning. I am pursuing a B.S. in Computer Science and Engineering at Sungkyunkwan University (expected Aug. 2027) and am actively seeking graduate research opportunities for <strong>Fall 2027</strong>.'

